services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: edgar-lens-db
    environment:
      POSTGRES_USER: edgar
      POSTGRES_PASSWORD: edgar
      POSTGRES_DB: edgarlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/EdgarLens.Infrastructure/Database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgar -d edgarlens"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: edgar-lens-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama
    container_name: edgar-lens-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull nomic-embed-text
        ollama pull llama3.2
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: no

  api:
    build:
      context: .
      dockerfile: src/EdgarLens.Api/Dockerfile
    container_name: edgar-lens-api
    ports:
      - "5097:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=edgarlens;Username=edgar;Password=edgar
      - EdgarSettings__BaseUrl=https://data.sec.gov
      - EdgarSettings__UserAgent=EdgarLens 0x7rix@protonmail.com
      - EdgarSettings__TickersUrl=https://www.sec.gov/files/company_tickers.json
      - EdgarSettings__ArchivesBaseUrl=https://www.sec.gov
      - EdgarSettings__OllamaBaseUrl=http://ollama:11434
      - EdgarSettings__EmbeddingModel=nomic-embed-text
      - EdgarSettings__ChatModel=llama3.2
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data: